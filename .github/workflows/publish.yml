name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release -p:Version=${{ steps.version.outputs.VERSION }} --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: |
          dotnet pack src/Facette.Abstractions -c Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Facette -c Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs
          dotnet pack src/Facette.EntityFrameworkCore -c Release -p:Version=${{ steps.version.outputs.VERSION }} -o ./nupkgs

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
